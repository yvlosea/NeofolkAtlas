<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Neofolk Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&family=Noto+Serif+Devanagari:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="reset-password">

  <div class="page-shell page-container">
    <header class="site-header">
      <a class="brand-mark" href="index.html" aria-label="Neofolk Atlas home">
        <img class="brand-logo" src="neofolk-logo.jpg" alt="Neofolk humanitarian education board logo" />
        <span class="brand-copy">
          <span class="brand-kicker">Neofolk Atlas</span>
          <strong>Learning as Identity</strong>
        </span>
      </a>
      <span class="version-badge">Alpha 11.4</span>
      <nav id="app-nav" class="site-nav" aria-label="Primary"></nav>
    </header>

    <!-- Deploy initResetPasswordPage() targets: reset-password-form, reset-message -->
    <main id="reset-root" class="page-stack">
      <section class="card" style="max-width: 480px; margin: 0 auto;">
        <p class="section-label">Account Recovery</p>
        <h1>Set a new password</h1>
        <p class="lede">Choose a new password for your Neofolk Atlas account. Use the newest recovery email link if this page says your session is invalid.</p>

        <form id="reset-password-form" class="form-stack" style="margin-top: 24px;">
          <label>
            New password
            <input id="new-password" name="newPassword" type="password" autocomplete="new-password" required placeholder="••••••••" />
          </label>
          <label>
            Confirm new password
            <input id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required placeholder="••••••••" />
          </label>
          <button class="btn btn-primary" type="submit">Update password</button>
          <a class="btn subtle-button" href="index.html">Return to login</a>
        </form>

        <p id="reset-message" class="status-text" aria-live="polite" style="margin-top: 16px;"></p>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
