<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="supabase-url" content="https://mopxfemfkrnthaadjxoi.supabase.co" />
  <meta name="supabase-anon-key" content="sb_publishable_Xf1_yxMNpNuSkBLpYfXQpw_wF1DogRa" />
  <title>Reset Password | Neofolk Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&family=Noto+Serif+Devanagari:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="internal-styles.css" />
  <link rel="icon" type="image/jpeg" href="neofolk-logo.jpg" />
</head>
<body class="internal-page neo-theme" data-page="reset-password">

  <div class="neo-layout">

    <aside class="neo-sidebar sidebar">
      <div class="brand-area">
        <h2>Neofolk</h2>
      </div>
      <nav id="app-nav" class="sidebar-nav" aria-label="Primary"></nav>
      <div class="sidebar-content"></div>
    </aside>

    <main class="neo-main">

      <section class="neo-board">
        <div class="neo-board-layer"></div>
        <div class="neo-board-grid"></div>
      </section>

      <section class="page-shell">
        <div class="page-stack">
          <div id="reset-root">
            <section class="card" style="max-width: 480px; margin: 0 auto;">
              <p class="section-label">Account Recovery</p>
              <h1>Set a new password</h1>
              <p class="lede">Choose a new password for your Neofolk Atlas account. Use the newest recovery email link if this page says your session is invalid.</p>

              <form id="reset-password-form" class="form-stack" method="post" action="" style="margin-top: 24px;">
                <label>
                  New password
                  <div class="input-wrap">
                    <input id="new-password" name="newPassword" type="password" autocomplete="new-password" required placeholder="••••••••" />
                    <button type="button" class="pw-toggle" onclick="togglePassword('new-password')">Show</button>
                  </div>
                </label>
                <label>
                  Confirm new password
                  <div class="input-wrap">
                    <input id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required placeholder="••••••••" />
                    <button type="button" class="pw-toggle" onclick="togglePassword('confirm-password')">Show</button>
                  </div>
                </label>
                <button class="btn btn-primary" type="submit">Update password</button>
                <a class="btn subtle-button" href="index.html">Return to login</a>
              </form>

              <p id="reset-message" class="status-text" aria-live="polite" style="margin-top: 16px;"></p>
            </section>
          </div>
        </div>
      </section>

    </main>

  </div>

  <script type="module" src="app.js"></script>
  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      const btn = input.nextElementSibling;
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    }
  </script>
</body>
</html>
