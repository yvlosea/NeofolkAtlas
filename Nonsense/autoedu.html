<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Supabase credentials (required for auth + DB queries in app.js) -->
  <meta name="supabase-url" content="https://mopxfemfkrnthaadjxoi.supabase.co" />
  <meta name="supabase-anon-key" content="sb_publishable_Xf1_yxMNpNuSkBLpYfXQpw_wF1DogRa" />

  <title>AutoEdu | Neofolk Atlas</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&family=Noto+Serif+Devanagari:wght@500;600&display=swap" rel="stylesheet" />

  <!-- Stylesheets (order matters — internal-styles.css overrides base styles.css) -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="internal-styles.css" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="iNHET-logo.png" />
</head>
<body class="internal-page neo-theme" data-page="autoedu">

  <div class="neo-layout">

    <!-- Sidebar navigation (populated by app.js renderAppNav) -->
    <aside class="neo-sidebar sidebar">
      <div class="brand-area">
        <h2>Neofolk</h2>
      </div>
      <nav id="app-nav" class="sidebar-nav" aria-label="Primary"></nav>
      <div class="sidebar-content"></div>
    </aside>

    <main class="neo-main">

      <section class="neo-board">
        <div class="neo-board-layer"></div>
        <div class="neo-board-grid"></div>
      </section>

      <section class="page-shell">
        <div class="page-stack">
          <!-- AutoEdu renders into this root div via app.js → initAutoEdu() -->
          <div id="autoedu-root"></div>
        </div>
      </section>

    </main>

  </div>

  <!--
    CRITICAL FIX: must be type="module" because app.js uses ES module
    import syntax at the top (import { createClient } from 'https://...')
    Without type="module" the browser throws a SyntaxError and nothing runs.
  -->
  <script type="module" src="app.js"></script>
</body>
</html>
