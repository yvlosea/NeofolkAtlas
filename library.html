<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Library — Neofolk Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&family=Noto+Serif+Devanagari:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="internal-styles.css" />
  <link rel="icon" type="image/jpeg" href="iNHET-logo.png" />
  <style>
    :root {
      --library-bg: #f5f3ef;
      --library-ink: #1a1814;
      --library-line: #d4cfc7;
      --library-accent: #8b7355;
      --library-muted: #6b655d;
    }

    .library-page {
      background: var(--library-bg);
      color: var(--library-ink);
      min-height: 100vh;
    }

    .library-page .neo-sidebar {
      background: var(--library-bg);
      border-right-color: var(--library-line);
    }

    .library-page .brand-area h2 {
      color: var(--library-ink);
    }

    .library-page .neo-main {
      background: var(--library-bg);
    }

    .library-page .mobile-topbar {
      background: var(--library-bg);
      border-bottom-color: var(--library-line);
    }

    .library-page .mobile-brand {
      color: var(--library-ink);
    }

    .library-header {
      padding: 48px 40px 32px;
      border-bottom: 1px solid var(--library-line);
    }

    .library-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 500;
      color: var(--library-ink);
      margin: 0 0 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .library-header p {
      font-size: 0.85rem;
      color: var(--library-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .library-container {
      display: flex;
      min-height: calc(100vh - 140px);
    }

    .library-nav {
      width: 320px;
      border-right: 1px solid var(--library-line);
      padding: 24px 0;
      position: sticky;
      top: 0;
      height: fit-content;
      max-height: calc(100vh - 140px);
      overflow-y: auto;
    }

    .library-search {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--library-line);
    }

    .library-search input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--library-line);
      background: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      color: var(--library-ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .library-search input:focus {
      border-color: var(--library-accent);
    }

    .library-search input::placeholder {
      color: var(--library-muted);
    }

    .library-nav-header {
      padding: 16px 20px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--library-muted);
      font-weight: 600;
    }

    .library-nav-item {
      display: block;
      padding: 12px 20px;
      font-size: 0.9rem;
      color: var(--library-ink);
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      cursor: pointer;
    }

    .library-nav-item:hover {
      background: rgba(139,115,85,0.08);
      border-left-color: var(--library-accent);
    }

    .library-nav-item.active {
      background: rgba(139,115,85,0.12);
      border-left-color: var(--library-accent);
      font-weight: 500;
    }

    .library-content {
      flex: 1;
      padding: 40px;
      max-width: 800px;
    }

    .library-intro {
      margin-bottom: 48px;
    }

    .library-intro h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--library-ink);
      margin: 0 0 16px;
    }

    .library-intro p {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--library-muted);
    }

    .library-section {
      margin-bottom: 40px;
    }

    .library-section h3 {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--library-accent);
      margin: 0 0 16px;
      font-weight: 600;
    }

    .library-section p {
      font-size: 1rem;
      line-height: 1.9;
      color: var(--library-ink);
      margin: 0 0 16px;
    }

    .library-section ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .library-section li {
      padding: 12px 0;
      border-bottom: 1px solid var(--library-line);
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--library-ink);
    }

    .library-section li:last-child {
      border-bottom: none;
    }

    .library-book {
      padding: 16px 0;
      border-bottom: 1px solid var(--library-line);
    }

    .library-book:last-child {
      border-bottom: none;
    }

    .library-book-title {
      font-weight: 600;
      color: var(--library-ink);
      margin: 0 0 4px;
    }

    .library-book-author {
      font-size: 0.85rem;
      color: var(--library-muted);
      margin: 0 0 8px;
    }

    .library-book-quote {
      font-style: italic;
      color: var(--library-muted);
      font-size: 0.9rem;
      line-height: 1.6;
      padding-left: 16px;
      border-left: 2px solid var(--library-line);
    }

    .library-media-tag {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(139,115,85,0.1);
      border: 1px solid var(--library-line);
      font-size: 0.8rem;
      color: var(--library-muted);
      margin: 4px 8px 4px 0;
    }

    .library-link {
      display: block;
      padding: 8px 0;
      color: var(--library-accent);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .library-link:hover {
      color: var(--library-ink);
    }

    .language-switcher {
      display: flex;
      gap: 4px;
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--library-line);
    }

    .language-btn {
      padding: 6px 12px;
      border: 1px solid var(--library-line);
      background: transparent;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--library-muted);
    }

    .language-btn:hover {
      border-color: var(--library-accent);
      color: var(--library-accent);
    }

    .language-btn.active {
      background: var(--library-ink);
      color: var(--library-bg);
      border-color: var(--library-ink);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--library-accent);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--library-ink);
    }

    @media (max-width: 768px) {
      .library-container {
        flex-direction: column;
      }

      .library-nav {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--library-line);
        position: static;
        max-height: none;
      }

      .library-content {
        padding: 24px;
      }

      .library-header {
        padding: 24px;
      }

      .library-header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body class="internal-page library-page" data-page="library">

                </nav>

                <div class="library-content" id="libraryContent">

                </div>
              </div>
            </div>

          </div>
        </div>
      </section>

    </main>

  </div>

            "राजनीतिक भाषण में कोडित भाषा की पहचान करना।",
            "'धार्मिक' संगठनों को धन प्रवाह का मानचित्रण करना।",
            "सांस्कृतिक गौरव को राजनीतिक बहिष्करण से अलग करना।"
          ],
          ur: [
            "سیاسی تقریر میں کوڈڈ زبان کی شناخت کرنا۔",
            "'مذہبی' تنظیموں کے لیے فنڈنگ کے بہاؤ کا نقشہ بنانا۔",
            "ثقافتی فخر کو سیاسی علیحدگی سے الگ کرنا۔"
          ]
        },
        commonMisunderstandings: {
          en: [
            "Only minorities are communal.",
            "Secularism means being 'anti-religion'.",
            "Communal violence is spontaneous (it is usually orchestrated)."
          ],
          hi: [
            "केवल अल्पसंख्यक ही सांप्रदायिक होते हैं।",
            "धर्मनिरपेक्षता का अर्थ है 'धर्म-विरोधी' होना।",
            "सांप्रदायिक हिंसा स्वतःस्फूर्त है (यह आमतौर पर संचालित होती है)।"
          ],
          ur: [
            "صرف اقلیتیں ہی فرقہ وار ہوتی ہیں۔",
            "سیکولرزم کا مطلب 'دشمن مذہب' ہونا ہے۔",
            "فرقہ وارانہ تشدد خود بخود ہوتا ہے (یہ عام طور پر تیار کیا جاتا ہے)۔"
          ]
        },
        booksToRead: [
          { title: "The Idea of India", author: "Sunil Khilnani" },
          { title: "Communalism in Modern India", author: "Bipan Chandra" },
          { title: "Gujarat: The Making of a Tragedy", author: "Siddharth Varadarajan" }
        ],
        mediaReferences: ["Garam Hava", "Final Solution", "Article 15"],
        realWorldApplications: {
          en: "Electoral strategy, riot prevention, policy analysis, media literacy.",
          hi: "चुनावी रणनीति, दंगा रोकथाम, नीति विश्लेषण, मीडिया साक्षरता।",
          ur: "انتخابی حکمت عملی، فساد روک تھام، پالیسی تجزیہ، میڈیا literacy۔"
        },
        furtherLearningResources: ["Fact-checking tools", "Electoral commission reports"]
      }
    ];

    const UI_TRANSLATIONS = {
      en: {
        brand: "The Library",
        motto: "Public Knowledge Infrastructure • Open-Access / Non-Certified",
        navHeader: "Knowledge Pillars",
        lookup: "Lookup...",
        whyTitle: "Why This Matters",
        conceptsTitle: "Key Concepts",
        skillsTitle: "Practical Skills",
        misunderstandingsTitle: "Common Misunderstandings",
        booksTitle: "Required Reading",
        mediaTitle: "Media References",
        appsTitle: "Real-World Applications",
        resourcesTitle: "Further Learning"
      },
      hi: {
        brand: "द लाइब्रेरी",
        motto: "सार्वजनिक ज्ञान अवसंरचना • खुली पहुँच / गैर-प्रमाणित",
        navHeader: "ज्ञान के स्तंभ",
        lookup: "खोजें...",
        whyTitle: "यह क्यों मायने रखता है",
        conceptsTitle: "मुख्य अवधारणाएं",
        skillsTitle: "व्यावहारिक कौशल",
        misunderstandingsTitle: "आम गलतफहमियां",
        booksTitle: "आवश्यक पठन",
        mediaTitle: "मीडिया संदर्भ",
        appsTitle: "वास्तविक दुनिया के अनुप्रयोग",
        resourcesTitle: "आगे सीखना"
      },
      ur: {
        brand: "دی لائبریری",
        motto: "عوامی علمی انفراسٹرکچر • اوپن ایکسیس / غیر تصدیق شدہ",
        navHeader: "علم کے ستون",
        lookup: "تلاش کریں...",
        whyTitle: "یہ کیوں ضروری ہے",
        conceptsTitle: "بنیادی تصورات",
        skillsTitle: "عملی مہارتیں",
        misunderstandingsTitle: "عام غلط فہمیاں",
        booksTitle: "ضروری مطالعہ",
        mediaTitle: "میڈیا کے حوالے",
        appsTitle: "حقیقی دنیا میں اطلاق",
        resourcesTitle: "مزید سیکھنا"
      }
    };

    // State
    let currentLang = 'en';
    let selectedTopicId = null;
    let searchQuery = '';

    // DOM Elements
    const navItems = document.getElementById('navItems');
    const libraryContent = document.getElementById('libraryContent');
    const searchInput = document.getElementById('searchInput');
    const langBtns = document.querySelectorAll('.language-btn');

    // Functions
    function getTranslation(key) {
      return UI_TRANSLATIONS[currentLang][key] || UI_TRANSLATIONS.en[key];
    }

    function filterTopics() {
      if (!searchQuery) return LIBRARY_DATA;
      return LIBRARY_DATA.filter(topic => {
        const title = topic.title[currentLang] || topic.title.en;
        const coreIdea = topic.coreIdea[currentLang] || topic.coreIdea.en;
        return title.toLowerCase().includes(searchQuery.toLowerCase()) ||
               coreIdea.toLowerCase().includes(searchQuery.toLowerCase());
      });
    }

    function renderNav() {
      const filtered = filterTopics();
      navItems.innerHTML = filtered.map(topic => {
        const title = topic.title[currentLang] || topic.title.en;
        const isActive = selectedTopicId === topic.id;
        return `<a class="library-nav-item ${isActive ? 'active' : ''}" data-topic="${topic.id}">${title}</a>`;
      }).join('');

      // Add click handlers
      document.querySelectorAll('.library-nav-item').forEach(item => {
        item.addEventListener('click', () => {
          selectedTopicId = item.dataset.topic;
          renderNav();
          renderContent();
        });
      });
    }

    function renderContent() {
      if (!selectedTopicId) {
        renderIntro();
        return;
      }

      const topic = LIBRARY_DATA.find(t => t.id === selectedTopicId);
      if (!topic) return;

      const t = UI_TRANSLATIONS[currentLang];
      const title = topic.title[currentLang] || topic.title.en;
      const coreIdea = topic.coreIdea[currentLang] || topic.coreIdea.en;
      const why = topic.whyThisMatters[currentLang] || topic.whyThisMatters.en;
      const concepts = topic.keyConcepts[currentLang] || topic.keyConcepts.en;
      const skills = topic.practicalSkills[currentLang] || topic.practicalSkills.en;
      const misunderstandings = topic.commonMisunderstandings[currentLang] || topic.commonMisunderstandings.en;
      const apps = topic.realWorldApplications[currentLang] || topic.realWorldApplications.en;

      libraryContent.innerHTML = `
        <a class="back-link" onclick="showIntro()">← Back to Overview</a>

        <div class="library-section">
          <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 500; color: var(--library-ink); margin: 0 0 16px;">${title}</h2>
          <p style="font-size: 1.1rem; line-height: 1.8; color: var(--library-muted); font-style: italic;">${coreIdea}</p>
        </div>

        <div class="library-section">
          <h3>${t.whyTitle}</h3>
          <p>${why}</p>
        </div>

        <div class="library-section">
          <h3>${t.conceptsTitle}</h3>
          <ul>
            ${concepts.map(c => `<li>${c}</li>`).join('')}
          </ul>
        </div>

        <div class="library-section">
          <h3>${t.skillsTitle}</h3>
          <ul>
            ${skills.map(s => `<li>${s}</li>`).join('')}
          </ul>
        </div>

        <div class="library-section">
          <h3>${t.misunderstandingsTitle}</h3>
          <ul>
            ${misunderstandings.map(m => `<li>${m}</li>`).join('')}
          </ul>
        </div>

        <div class="library-section">
          <h3>${t.booksTitle}</h3>
          ${topic.booksToRead.map(book => {
            const quote = book.quote ? (book.quote[currentLang] || book.quote.en) : null;
            return `
              <div class="library-book">
                <p class="library-book-title">${book.title}</p>
                <p class="library-book-author">by ${book.author}</p>
                ${quote ? `<p class="library-book-quote">"${quote}"</p>` : ''}
              </div>
            `;
          }).join('')}
        </div>

        <div class="library-section">
          <h3>${t.mediaTitle}</h3>
          ${topic.mediaReferences.map(media => `<span class="library-media-tag">${media}</span>`).join('')}
        </div>

        <div class="library-section">
          <h3>${t.appsTitle}</h3>
          <p>${apps}</p>
        </div>

        <div class="library-section">
          <h3>${t.resourcesTitle}</h3>
          <ul>
            ${topic.furtherLearningResources.map(r => `<li>${r}</li>`).join('')}
          </ul>
        </div>
      `;
    }

    function renderIntro() {
      selectedTopicId = null;
      renderNav();

      libraryContent.innerHTML = `
        <div class="library-intro">
          <h2>Infrastructure Overview</h2>
          <p>The Library is a structured collection of open knowledge designed to help individuals develop intellectual independence, civic awareness, and critical thinking in the modern world.</p>
          <p style="margin-top: 16px;">All content is available in English, Hindi, and Urdu. Select a topic from the sidebar to begin.</p>
        </div>

        <div class="library-section">
          <h3>System Identity</h3>
          <ul>
            <li><strong>Personal Autonomy Foundations</strong> — Building independent thinking skills</li>
            <li><strong>Technological Literacy</strong> — Understanding systems that shape our lives</li>
            <li><strong>Resilience Protocols</strong> — Practical knowledge for uncertain times</li>
            <li><strong>Civic Stabilization</strong> — Understanding social and political dynamics</li>
          </ul>
        </div>

        <div class="library-section">
          <h3>Provision</h3>
          <p>Open-access, non-certified, freely distributable knowledge. The Library is a human right.</p>
        </div>

        <div class="library-section">
          <h3>Constraints</h3>
          <ul>
            <li>No Certification — Knowledge for its own sake</li>
            <li>No Gatekeeping — Open to all</li>
            <li>No Ideological Preaching — Evidence-based, balanced perspectives</li>
          </ul>
        </div>

        <div class="library-section">
          <p style="font-style: italic; color: var(--library-accent); font-size: 1.1rem;">"Knowledge is the first line of defense for a free citizen."</p>
        </div>
      `;
    }

    function showIntro() {
      selectedTopicId = null;
      renderNav();
      renderIntro();
    }

    // Event Listeners
    langBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        langBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLang = btn.dataset.lang;
        document.documentElement.lang = currentLang;
        document.documentElement.dir = currentLang === 'ur' ? 'rtl' : 'ltr';
        renderNav();
        renderContent();
      });
    });

    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderNav();
    });

    // Expose showIntro globally
    window.showIntro = showIntro;

    // Initialize
    renderIntro();
  </script>

</body>
</html>
